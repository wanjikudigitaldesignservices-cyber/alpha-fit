<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Alpha Fit Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Roboto Condensed',sans-serif;background:#F3F4F6;color:#1f2937}h1,h2{font-family:'Anton',sans-serif;letter-spacing:1px;text-transform:uppercase}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111827}.lb{background:#ffffff;padding:50px;border:5px solid #DC2626;max-width:400px;width:100%;text-align:center;box-shadow:10px 10px 0px rgba(220,38,38,0.2)}.lb h2{color:#111827;margin-bottom:24px;font-size:2.5rem}.lb input{width:100%;padding:16px;border:3px solid #4B5563;background:#F3F4F6;color:#111827;margin-bottom:15px;font-size:1.1rem;font-family:'Roboto Condensed',sans-serif;font-weight:700}.lb button{width:100%;padding:16px;background:#DC2626;color:white;border:none;cursor:pointer;font-size:1.2rem;font-family:'Anton',sans-serif;text-transform:uppercase;letter-spacing:2px;clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);transition:0.2s}.lb button:hover{background:#111827}
.dash{display:none}.dh{background:#111827;color:white;padding:25px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;border-bottom:5px solid #DC2626}.dh h1{font-size:2.5rem}.dh button,.dh a{padding:10px 24px;border:3px solid #DC2626;cursor:pointer;font-size:1.1rem;color:#white;background:transparent;text-decoration:none;font-family:'Anton',sans-serif;text-transform:uppercase;letter-spacing:1px;clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);transition:0.2s}.dh button:hover,.dh a:hover{background:#DC2626;color:white}.be{background:#DC2626!important;color:white!important}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;padding:40px}.sc{background:white;padding:30px;border:3px solid #111827;box-shadow:5px 5px 0px rgba(17,24,39,0.1)}.sl{font-size:1.1rem;color:#6b7280;text-transform:uppercase;font-weight:700;font-family:'Anton',sans-serif;letter-spacing:1px}.sv{font-size:4rem;font-family:'Anton',sans-serif;margin-top:10px;color:#DC2626;line-height:1}
.tw{padding:0 40px 40px;overflow-x:auto}table{width:100%;border-collapse:collapse;background:white;border:3px solid #111827}th{background:#111827;color:white;padding:20px;text-align:left;font-size:1.1rem;text-transform:uppercase;letter-spacing:1px;border-bottom:3px solid #DC2626;font-family:'Anton',sans-serif}td{padding:18px 20px;border-bottom:1px solid #e5e7eb;font-size:1.1rem;font-weight:700}
select.st{padding:10px 14px;border:3px solid #4B5563;font-family:'Roboto Condensed',sans-serif;font-weight:700;background:#F3F4F6;color:#111827;outline:none}.del{background:none;border:none;color:#DC2626;cursor:pointer;font-size:1.1rem;text-transform:uppercase;letter-spacing:1px;font-family:'Anton',sans-serif}
@media(max-width:768px){.stats{grid-template-columns:1fr}}</style></head>
<body>
<div class="login" id="ls"><div class="lb"><h2>Coach Portal</h2><input type="text" id="u" value="admin"><input type="password" id="p" placeholder="Password"><button onclick="login()">Enter Box</button></div></div>
<div class="dash" id="dash">
<div class="dh"><h1>Alpha Fit HQ</h1><div><button class="be" onclick="exp()">Export</button> <a href="index.html">View Site</a> <button onclick="logout()">Logout</button></div></div>
<div class="stats"><div class="sc"><div class="sl">Total Requests</div><div class="sv" id="st">0</div></div><div class="sc"><div class="sl">New / Unread</div><div class="sv" id="sn" style="color:#111827">0</div></div><div class="sc"><div class="sl">Confirmed</div><div class="sv" id="sd" style="color:#DC2626">0</div></div></div>
<div class="tw"><table><thead><tr><th>Date Rec'd</th><th>Athlete Name</th><th>Contact</th><th>Membership/Class</th><th>Target Date</th><th>Level</th><th>Status</th><th></th></tr></thead><tbody id="tb"></tbody></table></div></div>
<script>
const K='alphafit_bookings';if(sessionStorage.getItem('af_admin')==='true')showD();
function login(){if(document.getElementById('u').value==='admin'&&document.getElementById('p').value==='admin123'){sessionStorage.setItem('af_admin','true');showD()}else alert('Invalid credentials')}
function logout(){sessionStorage.removeItem('af_admin');location.reload()}
function showD(){document.getElementById('ls').style.display='none';document.getElementById('dash').style.display='block';render()}
function gd(){return JSON.parse(localStorage.getItem(K)||'[]').sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt))}
function sv(d){localStorage.setItem(K,JSON.stringify(d))}
function render(){const d=gd();document.getElementById('st').textContent=d.length;document.getElementById('sn').textContent=d.filter(x=>x.status==='New').length;document.getElementById('sd').textContent=d.filter(x=>x.status==='Confirmed').length;
document.getElementById('tb').innerHTML=d.map(i=>`<tr><td>${new Date(i.submittedAt).toLocaleDateString('en-GB')}</td><td style="font-family:'Anton',sans-serif;font-size:1.3rem;letter-spacing:1px;color:#DC2626">${i.name||'—'}</td><td>${i.phone}<br><span style="color:#6b7280;font-size:0.95rem">${i.email}</span></td><td>${i.service||'—'}</td><td>${i.date||'—'}</td><td>${i.experience||'—'}</td><td><select class="st" onchange="upd(${i.id},this.value)">${['New','Contacted','Confirmed','No Show','Completed'].map(s=>`<option ${i.status===s?'selected':''}>${s}</option>`).join('')}</select></td><td><button class="del" onclick="del(${i.id})">Del</button></td></tr>`).join('')}
function upd(id,s){const d=gd();const i=d.find(x=>x.id===id);if(i){i.status=s;sv(d);render()}}
function del(id){if(!confirm('Delete this request?'))return;sv(gd().filter(x=>x.id!==id));render()}
function exp(){const d=gd();if(!d.length)return alert('No data');const h=['Received','Name','Phone','Email','Service','Date','Experience','Status'];const r=d.map(i=>[new Date(i.submittedAt).toLocaleDateString(),i.name,i.phone,i.email,i.service,i.date,i.experience,i.status]);const c=[h,...r].map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='alphafit_requests.csv';a.click()}
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
</script></body></html>
